#https://private-user-images.githubusercontent.com/8555086/266798199-8ef461d9-3bb0-4789-9a6e-0c9949c587a6.png?jwt=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..sT-lDs_-NihvH9Xce6l-FugMPebioeNLdaaMONoWkSE
substitutions:
  device_name: "manon-display"
  device_friendly_name: "Manon Display"
  device_description: "ESP32-2424S012"
  time_timezone: "Europe/Amsterdam"

esphome:
  name: $device_name
  friendly_name: $device_friendly_name
  comment: $device_description
  #on_boot:
    #- delay: 5s
    #- lvgl.widget.hide: boot_screen
  #platformio_options:
  #  build_flags: ["-DLV_USE_PERF_MONITOR"]  

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

# Enable logging
logger:
  level: DEBUG

# Enable Home Assistant API
api:
  encryption:
    key: !secret home_assistant_key

ota:
  platform: esphome
  password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: $device_friendly_name
    password: !secret wifi_fallback_password
captive_portal:


#-------------------------------------------
# Display GC9A01A
#-------------------------------------------  
output:
  - platform: ledc
    pin:
      number: GPIO03
    id: backlight_output

light:
  - platform: monochromatic
    output: backlight_output
    name: Backlight
    id: backlight
    restore_mode: ALWAYS_ON
    default_transition_length: 0s

#-------------------------------------------
# CANBUS
#-------------------------------------------  
# rx_pin: GPIO21
# tx_pin: GPIO20

#-------------------------------------------
# Button
#-------------------------------------------  
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO9
      inverted: true
      ignore_strapping_warning: True
    name: "Boot button"
  - platform: gpio
    pin:
      number: GPIO20
      inverted: true
    name: "GPIO20"
  - platform: gpio
    pin:
      number: GPIO21
      inverted: true
    name: "GPIO21"
